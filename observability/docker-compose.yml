# PORTABILITY ALTERNATIVE — not the default on the 16 GB mini.
# The macOS Docker VM wires 2-8 GB that competes with the GPU's unified-memory
# working set; the default is native Homebrew services (~300 MB total).
# See observability/README.md for the sizing analysis.
#   docker compose -f observability/docker-compose.yml up -d
services:
  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    extra_hosts: ["host.docker.internal:host-gateway"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    ports: ["3000:3000"]
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  prom-data:
  grafana-data:
