# Native (Homebrew) Prometheus config — installed by ansible/site.yml to
# $(brew --prefix)/etc/prometheus.yml.
#
# Why native and not Docker: macOS runs Linux containers inside a VM that
# wires 2-8 GB of RAM whether the containers need it or not. On a 16 GB
# unified-memory host, that allocation competes directly with the GPU's
# working set during training/inference. Native Prometheus+Grafana cost
# ~300 MB total; the Docker route costs 2 GB+. See observability/README.md.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["localhost:8000"]
