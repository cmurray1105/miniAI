# ALTERNATIVE edge (option B in EDGE.md) — the deployed path is the all-AWS
# Lightsail bastion in deploy/bastion/. Kept because swapping edges is cheap.
#   cloudflared tunnel run --config deploy/cloudflared.yml miniai
tunnel: miniai
credentials-file: ~/.cloudflared/miniai.json

ingress:
  - hostname: mini-agent.dev
    service: http://localhost:8000
  # Optional: expose the Grafana dashboard read-only (anonymous Viewer role)
  - hostname: grafana.mini-agent.dev
    service: http://localhost:3000
  - service: http_status:404
