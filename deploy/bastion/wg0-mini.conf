# Mac mini side — ~/wg0.conf
[Interface]
Address = 10.8.0.2/24
PrivateKey = <contents of ~/.wg-mini.key>

[Peer]
# the Lightsail bastion
PublicKey = <BASTION_PUBKEY>
Endpoint = <bastion_public_ip>:51820
AllowedIPs = 10.8.0.1/32
# outbound keepalive is what lets the mini sit behind NAT with zero inbound ports
PersistentKeepalive = 25
