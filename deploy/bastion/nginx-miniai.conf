# Bastion nginx — reverse proxy over the WireGuard tunnel to the mini.
# TLS blocks are added by certbot; this is the pre-certbot config.

# edge rate limit: cheap 429s here before traffic crosses the tunnel;
# the gateway enforces its own smarter per-IP limit behind this
limit_req_zone $binary_remote_addr zone=edge:10m rate=30r/m;

server {
    listen 80;
    server_name mini-agent.dev;

    location / {
        limit_req zone=edge burst=10 nodelay;
        proxy_pass http://10.8.0.2:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # inference is slow; don't 504 a queued request
    }
}

server {
    listen 80;
    server_name grafana.mini-agent.dev;

    location / {
        limit_req zone=edge burst=10 nodelay;
        proxy_pass http://10.8.0.2:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Grafana live updates use websockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
