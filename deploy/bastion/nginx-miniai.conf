# Bastion nginx — reverse proxy over the WireGuard tunnel to the mini.
# TLS blocks are added by certbot; this is the pre-certbot config.

# The gateway is intentionally strict: it has an expensive, single-model
# upstream. Grafana is a browser SPA and loads many static chunks in parallel,
# so it needs its own substantially higher request budget.
limit_req_zone $binary_remote_addr zone=gateway:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=grafana:10m rate=10r/s;

server {
    listen 80;
    server_name mini-agent.dev;

    location / {
        limit_req zone=gateway burst=10 nodelay;
        proxy_pass http://10.8.0.2:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # inference is slow; don't 504 a queued request
    }
}

server {
    listen 80;
    server_name grafana.mini-agent.dev;

    location / {
        # Grafana fetches dozens of JavaScript/CSS chunks on first load. A
        # 30/minute gateway limit makes those chunks fail with nginx's 503
        # response, which Grafana surfaces as "chunk not found".
        limit_req zone=grafana burst=60 nodelay;
        proxy_pass http://10.8.0.2:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Grafana uses these and root_url to construct browser asset URLs.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        # Grafana live updates use websockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
