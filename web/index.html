<!doctype html><html lang="en"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>The Night Shift</title>
<style>body{margin:0;background:#100d1b;color:#f4eefc;font:17px/1.5 system-ui}main{max-width:760px;margin:auto;padding:40px 22px}h1{font-size:42px;margin:0;color:#ffcc66}.sub,.time{color:#b9a9cf}.card{background:#211a31;border:1px solid #514064;border-radius:16px;padding:24px;margin:22px 0}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.stat{background:#171221;padding:10px;border-radius:9px;text-align:center;font-size:12px}.stat b{display:block;font-size:19px;color:#ffcc66}button{display:block;width:100%;margin:10px 0;padding:15px;border:1px solid #71548c;border-radius:10px;background:#312445;color:white;text-align:left;font-size:16px;cursor:pointer}button:hover{background:#4a3263}.end{font-size:22px;color:#bff5d1}</style>
<main><h1>The Night Shift</h1><div class="sub">Overnight manager · Orbital Hotel Callisto · 00:00–08:00</div><div id="app" class="card">Opening the station ledger…</div></main>
<script>let shift;const app=document.querySelector('#app');const esc=s=>s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));async function start(){render(await(await fetch('/api/night-shift/start',{method:'POST'})).json())}async function pick(i){render(await(await fetch(`/api/night-shift/${shift}/choose/${i}`,{method:'POST'})).json())}function render(d){shift=d.shift_id;let s=d.state;let stats=[['Power',s.power],['Guest mood',s.mood],['Staff',s.staff],['Credits',s.credits],['Risk',s.risk]];app.innerHTML=`<div class="stats">${stats.map(x=>`<div class="stat"><b>${x[1]}</b>${x[0]}</div>`).join('')}</div>`;if(d.complete){app.innerHTML+=`<p class="end">${esc(d.report)}</p><button onclick="start()">Begin another shift</button>`;return}let n=d.incident;app.innerHTML+=`<p class="time">${n.time}</p><h2>Incident</h2><p>${esc(n.problem)}</p>${n.choices.map(c=>`<button onclick="pick(${c.id})">${esc(c.label)}</button>`).join('')}`}start()</script>
