name: CI/CD

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy the current main revision to the Mac mini
        required: true
        default: false
        type: boolean

# CI never needs cloud credentials. The deploy job uses the mini's existing
# AWS bootstrap configuration, not a GitHub secret.
permissions:
  contents: read

jobs:
  validate:
    name: Validate platform code and infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python checks
        run: pip install -r requirements-dev.txt ansible-core

      - name: Lint
        run: ruff check .

      - name: Unit tests
        run: pytest -q

      - name: Dataset reproducibility gate
        run: python data/generate_dataset.py --out /tmp/dataset && wc -l /tmp/dataset/*.jsonl

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Validate Terraform without touching remote state
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate

      - name: Validate host-provisioning syntax
        run: ansible-playbook ansible/site.yml --syntax-check

      - uses: hashicorp/setup-packer@v3

      - name: Validate the immutable bastion image definition
        working-directory: packer
        run: |
          packer init bastion.pkr.hcl
          packer validate bastion.pkr.hcl

  deploy:
    name: Converge Mac mini to main
    needs: validate
    # PR code can never reach the self-hosted runner. Deployment is also a
    # deliberate kill switch: set the repository variable DEPLOY_ENABLED away
    # from "true" to pause it without editing this workflow.
    if: >-
      vars.DEPLOY_ENABLED == 'true' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy))
    runs-on: [self-hosted, macOS, ARM64, miniai]
    environment: production
    concurrency:
      group: deploy-mini
      cancel-in-progress: false
    env:
      MINIAI_DIR: ${{ vars.MINIAI_DIR || '/Users/cmurray/LinkedIn/miniAI' }}
    steps:
      - name: Fast-forward the standing checkout
        shell: bash
        run: |
          test -d "$MINIAI_DIR/.git"
          git -C "$MINIAI_DIR" diff --quiet
          git -C "$MINIAI_DIR" diff --cached --quiet
          git -C "$MINIAI_DIR" fetch origin main
          git -C "$MINIAI_DIR" merge --ff-only origin/main

      - name: Converge services with Ansible
        working-directory: ${{ env.MINIAI_DIR }}
        run: ansible-playbook ansible/site.yml

      - name: Health gate
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8000/healthz; then
              exit 0
            fi
            sleep 5
          done
          echo "Gateway did not become healthy within 150 seconds." >&2
          exit 1
