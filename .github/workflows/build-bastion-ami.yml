name: Build bastion AMI

on:
  push:
    branches: [main]
    paths:
      - "packer/**"
      - "deploy/bastion/**"
      - ".github/workflows/build-bastion-ami.yml"
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region in which to build the ARM64 AMI
        required: true
        default: us-east-1
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: build-miniai-bastion-ami
  cancel-in-progress: false

jobs:
  build:
    name: Build immutable edge image
    # Configure this Environment with required reviewers and an OIDC role named
    # AWS_PACKER_ROLE_ARN. No long-lived AWS key is stored in GitHub.
    environment: infrastructure
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ inputs.aws_region || 'us-east-1' }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-packer@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PACKER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Initialize and validate image definition
        working-directory: packer
        run: |
          packer init bastion.pkr.hcl
          packer validate -var "aws_region=${{ env.AWS_REGION }}" bastion.pkr.hcl

      - name: Build image
        working-directory: packer
        run: >-
          packer build
          -var "aws_region=${{ env.AWS_REGION }}"
          -var "ami_name_prefix=miniai-bastion-${{ github.sha }}"
          bastion.pkr.hcl
